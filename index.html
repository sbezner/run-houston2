<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Run Houston &mdash; Upcoming Races</title>
  <meta name="description" content="Discover upcoming road, trail, and track races in the Houston, Texas area. Search and filter by distance and date.">
  <link rel="canonical" href="https://runhouston.app/">
  <meta name="theme-color" content="#c0392b">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        crossorigin="">
  <link rel="stylesheet" href="assets/css/styles.css?v=7">
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a href="index.html" class="brand">Run<span class="brand-mark"> Houston</span></a>
      <nav class="site-nav" aria-label="Primary">
        <a href="index.html" aria-current="page">Races</a>
        <a href="clubs.html">Clubs</a>
        <a href="reports.html">Reports</a>
        <a href="about.html">About</a>
      </nav>
    </div>
  </header>

  <main>
    <h1 class="page-title">Upcoming races</h1>

    <section class="filters" aria-label="Race filters">
      <div class="filter-row-inline">
        <input id="race-search" type="search"
               placeholder="Search races by name, city, or keyword&hellip;"
               aria-label="Search races" autocomplete="off">
      </div>

      <details class="filter-details">
        <summary class="filter-summary">More filters</summary>
        <div class="filter-details-body">
          <fieldset class="filter-group">
            <legend class="visually-hidden">Distance</legend>
            <div id="distance-chips" class="chip-row"></div>
          </fieldset>

          <div class="filter-row-inline">
            <label for="date-window">In the next</label>
            <select id="date-window">
              <option value="30">30 days</option>
              <option value="60">60 days</option>
              <option value="90">90 days</option>
              <option value="all" selected>All upcoming</option>
            </select>
          </div>
        </div>
      </details>
    </section>

    <div class="result-bar">
      <p id="result-count" class="result-count" aria-live="polite"></p>
      <div class="view-toggle" role="group" aria-label="View mode">
        <button type="button" id="view-list-btn" class="view-toggle-btn is-active"
                aria-pressed="true">List</button>
        <button type="button" id="view-map-btn" class="view-toggle-btn"
                aria-pressed="false">Map</button>
      </div>
    </div>

    <section id="race-list" aria-live="polite">
      <p class="loading">Loading races&hellip;</p>
    </section>

    <section id="race-map-wrap" hidden>
      <div id="race-map" class="rh-map" role="region" aria-label="Map of upcoming races"></div>
      <p id="map-note" class="map-note"></p>
    </section>
  </main>

  <footer class="site-footer">
    <p>Run Houston &middot; A community race guide for the Bayou City.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/alasql@4.5.1/dist/alasql.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          crossorigin=""></script>
  <script src="assets/js/common.js?v=3"></script>
  <script src="assets/js/index.js?v=6"></script>
</body>
</html>
