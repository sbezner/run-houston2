version: "3.9"

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: runhou_db
    environment:
      POSTGRES_USER: rh_user
      POSTGRES_PASSWORD: rh_pass
      POSTGRES_DB: runhou
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rh_user -d runhou"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    container_name: runhou_api
    environment:
      DATABASE_URL: postgresql://rh_user:rh_pass@db:5432/runhou
      ADMIN_SECRET: default-admin-secret
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ../api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  db_data:
